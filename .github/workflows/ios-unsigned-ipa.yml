name: iOS Unsigned IPA (Native)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "native-ios/**"
      - ".github/workflows/ios-unsigned-ipa.yml"

jobs:
  build-unsigned-ipa:
    runs-on: macos-15
    permissions:
      contents: read
    concurrency:
      group: native-ios-unsigned-ipa-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          cd native-ios
          xcodegen generate

      - name: Build unsigned iOS app
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild \
            -project native-ios/ListenSDR.xcodeproj \
            -scheme ListenSDR \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath native-ios/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            clean build | tee native-ios-build.log

      - name: Package unsigned IPA
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="native-ios/build/Build/Products/Release-iphoneos/ListenSDR.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "No app bundle found at $APP_PATH"
            exit 1
          fi
          rm -rf unsigned-ipa
          mkdir -p unsigned-ipa/Payload
          cp -R "$APP_PATH" unsigned-ipa/Payload/
          (
            cd unsigned-ipa
            zip -qry ../Listen-SDR-unsigned.ipa Payload
          )

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v6
        with:
          name: Listen-SDR-unsigned-ipa
          path: Listen-SDR-unsigned.ipa
          if-no-files-found: error
          retention-days: 7

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: Listen-SDR-native-ios-build-log
          path: native-ios-build.log
          if-no-files-found: error
          retention-days: 7
