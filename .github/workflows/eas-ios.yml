name: EAS iOS Build

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Expo CLI
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          expo-cache: true

      - name: Install dependencies
        run: npm ci

      - name: Set Apple ASC key from secrets
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          echo "$ASC_API_KEY_BASE64" | base64 --decode > asc-api-key.p8
          echo "EXPO_ASC_API_KEY_PATH=$PWD/asc-api-key.p8" >> $GITHUB_ENV

      - name: Set Apple team variables
        run: |
          echo "EXPO_APPLE_TEAM_ID=${{ secrets.EXPO_APPLE_TEAM_ID }}" >> $GITHUB_ENV
          echo "EXPO_APPLE_TEAM_TYPE=${{ secrets.EXPO_APPLE_TEAM_TYPE }}" >> $GITHUB_ENV
          echo "EXPO_ASC_KEY_ID=${{ secrets.ASC_KEY_ID }}" >> $GITHUB_ENV
          echo "EXPO_ASC_ISSUER_ID=${{ secrets.ASC_ISSUER_ID }}" >> $GITHUB_ENV

      - name: Build iOS (preview profile)
        run: |
          eas build --platform ios --profile preview --non-interactive --wait
