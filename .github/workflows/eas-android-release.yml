name: Android Public Release Disabled

on:
  workflow_dispatch:

jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Stop deprecated Android EAS release flow
        run: |
          echo "This workflow is intentionally disabled."
          echo "Reason: the EAS preview/internal artifact produced a much larger public APK than the local signed release."
          echo "Public Android releases must be published from the local signed APK in the private android-starter-app repository."
          echo "Use scripts\\Publish-ListenSDR-GitHubRelease.ps1 in android-starter-app instead."
          exit 1
